# ─── Server ───────────────────────────
server.port=8080

# ─── DataSource ───────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/orion_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:orion}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:orion_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── File Upload ──────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=./uploads

# ─── Agent Service ────────────────────
agent.service.url=${AGENT_SERVICE_URL:http://localhost:8000}

# ─── CORS ─────────────────────────────
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# ─── Jackson ─────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
